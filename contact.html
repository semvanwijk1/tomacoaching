<div class="contact-form-card reveal">
    <form action="https://formspree.io/f/jouw-id" method="POST">
        <div class="form-group">
            <label>Volledige Naam</label>
            <input type="text" name="naam" placeholder="bijv. Henriëtte Toma" required>
        </div>
        <div class="form-group">
            <label>E-mailadres</label>
            <input type="email" name="email" placeholder="naam@domein.nl" required>
        </div>
        <div class="form-group">
            <label>Waar gaat je vraag over?</label>
            <select name="onderwerp">
                <option value="Individuele Coaching">Individuele Coaching</option>
                <option value="Beeldcoaching">Beeldcoaching</option>
                <option value="Training op maat">Training op maat</option>
                <option value="Intervisie">Intervisie</option>
                <option value="Overig">Overig (vrije vraag)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Jouw bericht</label>
            <textarea name="bericht" rows="6" placeholder="Vertel me kort wat je coachvraag is..." required></textarea>
        </div>
        <button type="submit" class="btn-modern" style="width: 100%;">Verstuur aanvraag</button>
    </form>
</div>
