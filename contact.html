<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Toma Coaching</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="section-padding">
        <div class="container">
            <div class="reveal" style="text-align: center; margin-bottom: 60px;">
                <h1>Laten we kennismaken</h1>
                <p>Heb je een vraag of wil je direct een intake plannen? Ik hoor graag van je.</p>
            </div>

            <div class="contact-container reveal">
                <!-- Links: Kaart -->
                <div class="contact-map">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2462.64687254558!2d4.254130076891238!3d51.92138407191147!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47c44933a38a9b67%3A0x867332f146473ba!2sPaulus%20Potterplein%2025%2C%203141%20GJ%20Maassluis!5e0!3m2!1snl!2snl!4v1700000000000!5m2!1snl!2snl" 
                        width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
                    </iframe>
                </div>

                <!-- Rechts: Formulier -->
                <div class="contact-form-wrapper" style="background: white; padding: 40px; border-radius: 20px; box-shadow: var(--shadow);">
                    <form action="https://formspree.io/f/jouw-id" method="POST">
                        <label>Naam</label>
                        <input type="text" name="name" placeholder="Jouw volledige naam" required>
                        
                        <label>E-mailadres</label>
                        <input type="email" name="email" placeholder="naam@voorbeeld.nl" required>
                        
                        <label>Telefoonnummer</label>
                        <input type="tel" name="phone" placeholder="06 12345678">

                        <label>Jouw bericht</label>
                        <textarea name="message" rows="5" placeholder="Waar kan ik je mee helpen?" required></textarea>

                        <button type="submit" class="btn btn-primary" style="width: 100%;">Verstuur bericht</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="js/script.js"></script>
</body>
</html>
