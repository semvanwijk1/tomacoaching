<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Contact | Toma Coaching</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container" style="margin-top: 60px;">
        <h1 class="reveal" style="text-align: center; margin-bottom: 40px;">Contact opnemen</h1>

        <div class="contact-wrapper">
            <!-- LINKER KOLOM -->
            <div class="contact-left">
                <!-- Linksboven: Contactgegevens -->
                <div class="contact-info-box reveal">
                    <h3 style="margin-bottom: 15px;">Mijn Gegevens</h3>
                    <p>Voor een persoonlijke kennismaking of meer informatie kunt u mij direct bereiken.</p>
                    <div style="margin-top: 20px;">
                        <p><strong>Telefoon:</strong> 06 222 700 92</p>
                        <p><strong>Email:</strong> info@tomacoaching.nl</p>
                        <p><strong>Adres:</strong> Paulus Potterplein 25, Maassluis</p>
                    </div>
                </div>

                <!-- Linksonder: Maps kaart -->
                <div class="contact-map reveal">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2462.64687254558!2d4.254130076891238!3d51.92138407191147!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47c44933a38a9b67%3A0x867332f146473ba!2sPaulus%20Potterplein%2025%2C%203141%20GJ%20Maassluis!5e0!3m2!1snl!2snl!4v1710000000000!5m2!1snl!2snl" 
                        width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
                    </iframe>
                </div>
            </div>

            <!-- RECHTER KOLOM: Contactformulier -->
            <div class="contact-form-box reveal">
                <h3>Stuur een bericht</h3>
                <p style="margin-bottom: 25px; font-size: 0.9rem;">Ik reageer doorgaans binnen 24 uur.</p>
                <form action="https://formspree.io/f/jouw-id" method="POST">
                    <label>Uw Naam</label>
                    <input type="text" name="name" required placeholder="bijv. Jan Jansen">

                    <label>Emailadres</label>
                    <input type="email" name="email" required placeholder="naam@voorbeeld.nl">

                    <label>Onderwerp</label>
                    <select name="subject">
                        <option value="Individuele Coaching">Individuele Coaching</option>
                        <option value="Beeldcoaching">Beeldcoaching</option>
                        <option value="Training op maat">Training op maat</option>
                        <option value="Anders">Anders...</option>
                    </select>

                    <label>Uw Bericht</label>
                    <textarea name="message" rows="6" required placeholder="Waar kan ik u mee helpen?"></textarea>

                    <button type="submit" class="btn btn-pink" style="width: 100%;">Verstuur bericht</button>
                </form>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="js/script.js"></script>
</body>
</html>
